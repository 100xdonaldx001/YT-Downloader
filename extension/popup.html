<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yt-dlp Sender</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <h1>yt-dlp downloader</h1>
      <p class="subtitle">Quickly send the current tab to your local helper.</p>
    </header>

    <section class="panel">
      <label class="label" for="format">Format</label>
      <select id="format">
        <option value="mp4">Video (mp4)</option>
        <option value="mp3">Audio (mp3)</option>
        <option value="best">Best available</option>
      </select>

      <label class="label" for="filename">Download filename</label>
      <input id="filename" type="text" placeholder="Leave empty to use video title" />
      <p class="hint">Optional. Extension is picked automatically from the selected format.</p>

      <label class="label" for="outputPath">Output folder</label>
      <input id="outputPath" type="text" placeholder="F:\\Videos\\New Reports" />

      <button id="downloadBtn">Download current tab</button>
      <progress id="progress" max="100" value="0">0%</progress>
    </section>
    <p id="status"></p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
